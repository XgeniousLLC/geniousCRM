# docker-compose.yml
#
# Mini CRM — Docker Compose configuration
# Spins up: app (PHP-FPM), nginx, mysql, redis
#
# Author  : Xgenious (https://xgenious.com)
# License : MIT
#
# Usage:
#   docker-compose up -d
#   docker-compose exec app php artisan migrate --seed

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini_crm_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    networks:
      - mini_crm

  nginx:
    image: nginx:alpine
    container_name: mini_crm_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - mini_crm

  mysql:
    image: mysql:8.0
    container_name: mini_crm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mini_crm
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: mini_crm
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mini_crm

  redis:
    image: redis:7-alpine
    container_name: mini_crm_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - mini_crm

networks:
  mini_crm:
    driver: bridge

volumes:
  mysql_data:
