# docker-compose.prod.yml
#
# Mini CRM — Production Docker Compose
# Spins up: php-fpm, nginx (SSL), mysql, redis, queue worker
#
# Author  : Xgenious (https://xgenious.com)
# License : MIT
#
# Usage (first deploy):
#   cp .env.example .env
#   # Edit .env: APP_ENV=production, APP_DEBUG=false, DB_*, MAIL_*, QUEUE_CONNECTION=database
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml exec app php artisan migrate --force --seed
#   docker-compose -f docker-compose.prod.yml exec app php artisan storage:link
#   docker-compose -f docker-compose.prod.yml exec app npm run build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mini_crm_app
    restart: always
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - storage_data:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      - mysql
      - redis
    networks:
      - mini_crm_prod

  nginx:
    image: nginx:alpine
    container_name: mini_crm_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - mini_crm_prod

  mysql:
    image: mysql:8.0
    container_name: mini_crm_mysql_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mini_crm}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_in_env}
      MYSQL_USER: ${DB_USERNAME:-mini_crm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme_in_env}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - mini_crm_prod
    # Do NOT expose port 3306 in production

  redis:
    image: redis:7-alpine
    container_name: mini_crm_redis_prod
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_prod_data:/data
    networks:
      - mini_crm_prod
    # Do NOT expose port 6379 in production

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mini_crm_worker
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      - mysql
      - redis
    networks:
      - mini_crm_prod

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mini_crm_scheduler
    restart: always
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    networks:
      - mini_crm_prod

networks:
  mini_crm_prod:
    driver: bridge

volumes:
  mysql_prod_data:
  redis_prod_data:
  storage_data:
